version: "3.9"

services:
  web:
    build: .              # build from the Dockerfile in this directory (runs db/seed.py at build time)
    ports:
      - "8000:8000"        # host:container — visit http://localhost:8000
    env_file: .env         # supplies GROQ_API_KEY, DJANGO_SECRET_KEY, etc. (copy from .env.example first)
    volumes:
      - ./db:/app/db       # mount the host's db/ folder so the seeded SQLite file survives container restarts
