<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DB Agent — Ask your database anything</title>

  <!-- Bootstrap 5.3 + Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ── Layout ─────────────────────────────────── */
    html, body { height: 100%; overflow: hidden; }

    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .app-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--bs-border-color);
      background: var(--bs-body-bg);
    }

    .schema-pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: .68rem;
      max-height: 190px;
      overflow-y: auto;
      white-space: pre;
      background: rgba(0,0,0,.35);
      border-radius: .375rem;
      padding: .6rem .8rem;
      color: var(--bs-secondary-color);
      line-height: 1.55;
    }

    .example-btn {
      background: transparent;
      border: 1px solid transparent;
      border-radius: .5rem;
      padding: .45rem .7rem;
      font-size: .8rem;
      color: var(--bs-secondary-color);
      text-align: left;
      cursor: pointer;
      transition: all .15s;
      width: 100%;
    }
    .example-btn:hover {
      border-color: var(--bs-border-color);
      background: var(--bs-tertiary-bg);
      color: var(--bs-body-color);
    }

    /* ── Chat area ───────────────────────────────── */
    #chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.75rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    /* ── Message bubbles ─────────────────────────── */
    .msg { display: flex; gap: .75rem; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .avatar.bot  { background: var(--bs-tertiary-bg); border: 1px solid var(--bs-border-color); }
    .avatar.user { background: var(--bs-primary); }

    .bubble {
      border-radius: .875rem;
      padding: .7rem 1rem;
      font-size: .875rem;
      line-height: 1.65;
      word-break: break-word;
    }
    .msg.bot  .bubble {
      background: var(--bs-tertiary-bg);
      border: 1px solid var(--bs-border-color);
      border-top-left-radius: .25rem;
      max-width: 82%;
    }
    .msg.user .bubble {
      background: var(--bs-primary);
      color: #fff;
      border-top-right-radius: .25rem;
      max-width: 72%;
    }

    /* ── Thinking dots ───────────────────────────── */
    .thinking { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
    .thinking span {
      width: 7px; height: 7px;
      background: var(--bs-secondary-color);
      border-radius: 50%;
      animation: bounce 1.3s ease-in-out infinite;
      display: inline-block;
    }
    .thinking span:nth-child(2) { animation-delay: .2s; }
    .thinking span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: .35; }
      30%            { transform: translateY(-7px); opacity: 1; }
    }

    /* ── SQL code block ──────────────────────────── */
    .sql-block {
      font-family: 'JetBrains Mono', monospace;
      font-size: .72rem;
      background: #0d1117;
      border: 1px solid var(--bs-border-color);
      border-radius: .4rem;
      padding: .65rem .9rem;
      overflow-x: auto;
      white-space: pre;
      line-height: 1.55;
      color: #c9d1d9;
      margin-bottom: .5rem;
    }
    .sql-block:last-child { margin-bottom: 0; }
    .sql-kw { color: #ff7b72; font-weight: 500; }
    .sql-fn { color: #d2a8ff; }

    /* ── Meta row ────────────────────────────────── */
    .meta-row {
      display: flex; flex-wrap: wrap; gap: .5rem;
      margin-top: .6rem; padding-top: .6rem;
      border-top: 1px solid var(--bs-border-color);
    }

    /* ── Input bar ───────────────────────────────── */
    #input-area {
      border-top: 1px solid var(--bs-border-color);
      background: var(--bs-body-bg);
      padding: .85rem 1.5rem 1rem;
      flex-shrink: 0;
    }
    .input-shell {
      display: flex;
      align-items: flex-end;
      gap: .6rem;
      background: var(--bs-tertiary-bg);
      border: 1px solid var(--bs-border-color);
      border-radius: .75rem;
      padding: .6rem .7rem .6rem 1rem;
      transition: border-color .15s;
    }
    .input-shell:focus-within { border-color: var(--bs-primary); }
    #q-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-size: .875rem;
      color: var(--bs-body-color);
      line-height: 1.5;
      min-height: 22px;
      max-height: 120px;
    }
    #q-input::placeholder { color: var(--bs-secondary-color); }

    /* ── Scrollbar ───────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--bs-border-color); border-radius: 2px; }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ── Navbar ──────────────────────────────────── -->
  <nav class="navbar bg-body-tertiary border-bottom px-3 flex-shrink-0" style="height:56px">
    <span class="navbar-brand fw-bold mb-0 h5 d-flex align-items-center gap-2">
      <span class="badge bg-primary fs-6 lh-1 py-1 px-2">🤖</span>
      DB Agent
    </span>
    <div class="d-flex align-items-center gap-3">
      <button id="newChatBtn" class="btn btn-outline-secondary btn-sm" title="Start a new conversation">
        <i class="bi bi-plus-lg me-1"></i>New chat
      </button>
      <code class="badge bg-body border text-secondary fw-normal" id="modelBadge">llama-3.3-70b</code>
      <span class="d-flex align-items-center gap-2 small text-secondary">
        <span id="statusDot"
              class="rounded-circle d-inline-block"
              style="width:8px;height:8px;background:var(--bs-secondary-color)"></span>
        <span id="statusText">Connecting…</span>
      </span>
    </div>
  </nav>

  <!-- ── App body ────────────────────────────────── -->
  <div class="app-body">

    <!-- Sidebar -->
    <aside id="sidebar" class="p-0">
      <div class="p-3 border-bottom">
        <p class="text-uppercase text-secondary fw-semibold mb-2"
           style="font-size:.65rem;letter-spacing:.09em">📋 Schema</p>
        <pre class="schema-pre" id="schemaBox">Loading…</pre>
      </div>
      <div class="p-3 overflow-auto flex-grow-1">
        <p class="text-uppercase text-secondary fw-semibold mb-2"
           style="font-size:.65rem;letter-spacing:.09em">💡 Try these</p>
        <div id="examples" class="d-flex flex-column gap-1"></div>
      </div>
    </aside>

    <!-- Chat -->
    <div id="chat-main">

      <!-- Messages -->
      <div id="messages">
        <!-- Empty state -->
        <div id="emptyState"
             class="d-flex flex-column align-items-center justify-content-center text-center text-secondary my-auto"
             style="gap:1rem;padding:3rem 1rem">
          <div class="rounded-3 border d-flex align-items-center justify-content-center"
               style="width:60px;height:60px;font-size:1.75rem">💬</div>
          <div>
            <h5 class="text-body fw-semibold mb-1">Ask your database anything</h5>
            <p class="small mb-0" style="max-width:320px">
              Type a plain-English question — the AI agent writes SQL, runs it, and explains the results.
            </p>
          </div>
        </div>
      </div>

      <!-- Input -->
      <div id="input-area">
        <div class="input-shell">
          <textarea id="q-input" rows="1" placeholder="Ask a question about the data…"></textarea>
          <button id="sendBtn"
                  class="btn btn-primary btn-sm d-flex align-items-center justify-content-center flex-shrink-0"
                  style="width:36px;height:36px;border-radius:.5rem"
                  disabled title="Send (Enter)">
            <i class="bi bi-send-fill"></i>
          </button>
        </div>
        <p class="text-end text-secondary mb-0 mt-1" style="font-size:.7rem">
          Enter to send &nbsp;·&nbsp; Shift+Enter for newline
        </p>
      </div>

    </div><!-- /chat-main -->
  </div><!-- /app-body -->
</div><!-- /app-shell -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* ── Config ──────────────────────────────────────────── */
const API = "";   // same-origin: Django serves both the page and the API

/* ── Conversation session ─────────────────────────────── */
// Groups this tab's questions into one conversation so follow-ups like
// "now break that down by month" resolve against prior turns server-side.
let sessionId = crypto.randomUUID();

const EXAMPLES = [
  "Which product category has the highest total revenue?",
  "Who are the top 5 customers by total spending?",
  "What is the average order value per country?",
  "Which products have an average rating below 3?",
  "How many orders were placed each month in 2024?",
  "What percentage of orders are completed vs cancelled?",
  "Which city has the most Premium segment customers?",
  "What are the top 3 best-selling products by quantity?",
  "What is the total revenue per category in 2024?",
  "Which customers have placed more than 5 orders?",
];

/* ── Example buttons ─────────────────────────────────── */
const examplesEl = document.getElementById("examples");
EXAMPLES.forEach(q => {
  const btn = document.createElement("button");
  btn.className = "example-btn";
  btn.textContent = q;
  btn.onclick = () => setInput(q);   // clicking an example fills the textarea, doesn't auto-send
  examplesEl.appendChild(btn);
});

/* ── Input helpers ───────────────────────────────────── */
const inputEl = document.getElementById("q-input");
const sendBtn = document.getElementById("sendBtn");

inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";                                    // reset first so scrollHeight reflects only the current content
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px"; // grow with content, capped at 120px
  sendBtn.disabled = inputEl.value.trim().length < 3;                // mirrors the backend's 3-char minimum
});

inputEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {   // Enter sends; Shift+Enter inserts a newline (browser default)
    e.preventDefault();
    if (!sendBtn.disabled) submit();
  }
});

sendBtn.addEventListener("click", submit);

/* ── New chat ────────────────────────────────────────── */
const newChatBtn = document.getElementById("newChatBtn");
newChatBtn.addEventListener("click", async () => {
  if (busy) return;   // don't reset mid-request — could orphan an in-flight answer
  try {
    // Tell the server to drop this session's history — best-effort: even if
    // this fails, minting a new sessionId below still isolates the new chat.
    await fetch("/api/reset/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: sessionId }),
    });
  } catch { /* best-effort — a fresh sessionId below still isolates the new chat */ }

  sessionId = crypto.randomUUID();   // all future requests use this fresh, unrelated session
  document.getElementById("messages").innerHTML = `
    <div id="emptyState"
         class="d-flex flex-column align-items-center justify-content-center text-center text-secondary my-auto"
         style="gap:1rem;padding:3rem 1rem">
      <div class="rounded-3 border d-flex align-items-center justify-content-center"
           style="width:60px;height:60px;font-size:1.75rem">💬</div>
      <div>
        <h5 class="text-body fw-semibold mb-1">Ask your database anything</h5>
        <p class="small mb-0" style="max-width:320px">
          Type a plain-English question — the AI agent writes SQL, runs it, and explains the results.
        </p>
      </div>
    </div>`;
  inputEl.focus();
});

function setInput(text) {
  inputEl.value = text;
  inputEl.dispatchEvent(new Event("input"));   // triggers the resize/enable-button logic above
  inputEl.focus();
}

/* ── Health check + schema ───────────────────────────── */
async function init() {
  try {
    const r = await fetch("/api/health/");
    if (r.ok) {
      const d = await r.json();
      setStatus("success", "Connected");
      document.getElementById("modelBadge").textContent = d.model || "llama-3.3-70b";
      sendBtn.disabled = inputEl.value.trim().length < 3;   // re-enable send once we know the API is up
    } else {
      setStatus("danger", "API error");
    }
  } catch {
    setStatus("danger", "API unreachable");   // fetch itself threw — server likely isn't running
  }

  try {
    const r = await fetch("/api/schema/");
    if (r.ok) {
      const d = await r.json();
      document.getElementById("schemaBox").textContent = d.schema;   // populates the sidebar <pre> block
    }
  } catch {
    document.getElementById("schemaBox").textContent = "Schema unavailable";
  }
}

function setStatus(color, text) {
  const dot = document.getElementById("statusDot");
  dot.style.background = `var(--bs-${color})`;                                  // Bootstrap theme color, e.g. --bs-success
  if (color === "success") dot.style.boxShadow = `0 0 6px var(--bs-success)`;    // subtle glow only when connected
  document.getElementById("statusText").textContent = text;
}

/* ── SQL highlighter ─────────────────────────────────── */
// Matched separately from SQL_FN so keywords and function names get distinct colors below
const SQL_KW = /\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|FULL|CROSS|ON|GROUP\s+BY|ORDER\s+BY|HAVING|LIMIT|OFFSET|WITH|UNION|ALL|DISTINCT|AS|AND|OR|NOT|IN|IS|NULL|LIKE|BETWEEN|CASE|WHEN|THEN|ELSE|END|ASC|DESC|OVER|PARTITION\s+BY)\b/gi;
const SQL_FN = /\b(COUNT|SUM|AVG|MIN|MAX|ROUND|COALESCE|IFNULL|STRFTIME|LENGTH|UPPER|LOWER|SUBSTR|TRIM|DATE|DATETIME|ROW_NUMBER|RANK|DENSE_RANK|LEAD|LAG)\b/gi;

function hlSQL(raw) {
  // Escape HTML entities first so wrapping in <span> below can't be broken by the SQL text itself
  const e = raw.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  return e.replace(SQL_FN, m => `<span class="sql-fn">${m}</span>`)   // functions first...
          .replace(SQL_KW, m => `<span class="sql-kw">${m}</span>`);  // ...then keywords, since neither regex overlaps the other's matches
}

/* ── Table builder ───────────────────────────────────── */
function buildTable(rows) {
  if (!rows.length) return '<p class="small text-secondary p-2 mb-0">No rows.</p>';
  const cols = Object.keys(rows[0]);   // column names taken from the first row — all rows share the same shape
  let h = '<div class="table-responsive" style="max-height:220px"><table class="table table-sm table-bordered table-hover mb-0" style="font-size:.75rem;font-family:\'JetBrains Mono\',monospace"><thead class="table-dark sticky-top"><tr>';
  cols.forEach(c => { h += `<th class="text-uppercase text-secondary" style="font-size:.65rem;letter-spacing:.05em;white-space:nowrap">${esc(c)}</th>`; });
  h += "</tr></thead><tbody>";
  rows.forEach(row => {
    h += "<tr>";
    cols.forEach(c => { h += `<td style="white-space:nowrap">${esc(row[c] == null ? "—" : String(row[c]))}</td>`; });   // em-dash placeholder for NULLs
    h += "</tr>";
  });
  return h + "</tbody></table></div>";
}

/* ── Bootstrap accordion helper ─────────────────────── */
let accN = 0;   // monotonically increasing counter so every accordion instance gets a unique DOM id
function accordion(label, inner) {
  const id = `acc${++accN}`;   // e.g. "acc1", "acc2" — must be unique or Bootstrap's collapse toggle breaks
  return `
    <div class="accordion accordion-flush mt-2" style="border:1px solid var(--bs-border-color);border-radius:.5rem;overflow:hidden">
      <div class="accordion-item bg-transparent border-0">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed py-2 px-3 small text-secondary bg-transparent"
                  style="font-size:.78rem;box-shadow:none"
                  type="button" data-bs-toggle="collapse" data-bs-target="#${id}">
            ${label}
          </button>
        </h2>
        <div id="${id}" class="accordion-collapse collapse">
          <div class="accordion-body p-0">${inner}</div>
        </div>
      </div>
    </div>`;
}

/* ── Submit ──────────────────────────────────────────── */
let busy = false;   // guards against double-submit while a request is in flight

async function submit() {
  const q = inputEl.value.trim();
  if (!q || busy) return;

  busy = true;
  sendBtn.disabled = true;
  inputEl.value = "";
  inputEl.style.height = "auto";   // collapse the textarea back to one line

  document.getElementById("emptyState")?.remove();   // only present before the first message
  const feed = document.getElementById("messages");

  // User bubble — rendered immediately, before the network round-trip below
  feed.insertAdjacentHTML("beforeend", `
    <div class="msg user">
      <div class="avatar user">👤</div>
      <div class="bubble">${esc(q)}</div>
    </div>`);

  // Thinking bubble — placeholder shown while the agent is working, removed once the response arrives
  const tid = `t${Date.now()}`;   // unique-enough id to find and remove this exact bubble later
  feed.insertAdjacentHTML("beforeend", `
    <div class="msg bot" id="${tid}">
      <div class="avatar bot">🤖</div>
      <div class="bubble">
        <div class="thinking"><span></span><span></span><span></span></div>
      </div>
    </div>`);
  scrollBottom();

  try {
    const r = await fetch("/api/query/", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, session_id: sessionId }),
    });
    document.getElementById(tid)?.remove();   // clear the thinking bubble now that we have a response
    if (!r.ok) {
      const err = await r.json().catch(() => ({ error: r.statusText }));   // body may not be JSON on some failures
      addError(feed, err.error || "Request failed.");
    } else {
      addAnswer(feed, await r.json());
    }
  } catch {
    document.getElementById(tid)?.remove();
    addError(feed, "Could not reach the server. Is Django running?");
  }

  busy = false;
  sendBtn.disabled = inputEl.value.trim().length < 3;   // input is empty at this point, so this disables the button
  scrollBottom();
}

function addAnswer(feed, d) {
  let extras = "";   // accumulates the optional Plan/SQL/Data accordions below the main answer text

  if (d.plan?.length) {
    const items = d.plan.map(step => `<li>${esc(step)}</li>`).join("");
    extras += accordion(
      `<i class="bi bi-signpost-split me-1"></i>Plan &nbsp;<span class="badge bg-secondary">${d.plan.length} step${d.plan.length !== 1 ? "s" : ""}</span>`,
      `<ol class="mb-0 p-3 ps-4 small">${items}</ol>`
    );
  }

  if (d.sql_queries?.length) {
    const blocks = d.sql_queries.map(s =>
      `<div class="sql-block p-2">${hlSQL(s)}</div>`).join("");
    extras += accordion(
      `<i class="bi bi-search me-1"></i>SQL &nbsp;<span class="badge bg-secondary">${d.sql_queries.length}</span>`,
      `<div class="p-2">${blocks}</div>`
    );
  }

  if (d.data?.length) {
    extras += accordion(
      `<i class="bi bi-table me-1"></i>Data &nbsp;<span class="badge bg-secondary">${d.data.length} row${d.data.length !== 1 ? "s" : ""}</span>`,
      buildTable(d.data)
    );
  }

  // Only shown when the agent hit MAX_ITERATIONS without producing a final answer
  const warnBadge = d.success ? "" :
    `<span class="badge bg-warning text-dark"><i class="bi bi-exclamation-triangle me-1"></i>Did not converge</span>`;

  const meta = `
    <div class="meta-row">
      ${warnBadge}
      <span class="badge bg-secondary-subtle text-secondary border">
        <i class="bi bi-arrow-repeat me-1"></i>${d.iterations} step${d.iterations !== 1 ? "s" : ""}
      </span>
      <span class="badge bg-secondary-subtle text-secondary border">
        <i class="bi bi-lightning-fill me-1"></i>${d.latency_ms} ms
      </span>
    </div>`;

  feed.insertAdjacentHTML("beforeend", `
    <div class="msg bot">
      <div class="avatar bot">🤖</div>
      <div class="bubble" style="max-width:85%">
        <div>${esc(d.answer)}</div>
        ${extras}
        ${meta}
      </div>
    </div>`);
}

function addError(feed, msg) {
  feed.insertAdjacentHTML("beforeend", `
    <div class="msg bot">
      <div class="avatar bot">🤖</div>
      <div class="bubble">
        <span class="text-danger"><i class="bi bi-exclamation-circle me-1"></i>${esc(msg)}</span>
      </div>
    </div>`);
}

/* ── Utils ───────────────────────────────────────────── */
function esc(s) {
  // Escapes HTML-significant characters before interpolating user/LLM text into innerHTML —
  // without this, a question or answer containing "<" could break the page's markup.
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\n/g,"<br>");   // preserve line breaks from the answer/question text
}

function scrollBottom() {
  const m = document.getElementById("messages");
  m.scrollTop = m.scrollHeight;   // jump to the newest message
}

/* ── Boot ────────────────────────────────────────────── */
init();   // kicks off the health check + schema fetch as soon as the script loads
</script>

</body>
</html>
