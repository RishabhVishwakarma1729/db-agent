<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DB Agent — Ask your database anything</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #0f1117;
      --surface:        #1a1d27;
      --card:           #252836;
      --border:         #2d3148;
      --primary:        #6366f1;
      --primary-hover:  #4f52d4;
      --text:           #e2e8f0;
      --muted:          #8892a4;
      --success:        #22c55e;
      --error:          #ef4444;
      --warning:        #f59e0b;
      --font:           'Inter', sans-serif;
      --mono:           'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
    }
    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
    }
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .model-badge {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--muted);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.error     { background: var(--error); }

    /* ── Layout ─────────────────────────────────────────── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    aside {
      width: 272px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar-section {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .schema-box {
      font-family: var(--mono);
      font-size: 10.5px;
      color: var(--muted);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre;
      line-height: 1.55;
    }
    .examples-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px 16px;
    }
    .examples-title {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--muted);
      padding: 8px 4px 6px;
    }
    .example-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 12.5px;
      color: #c4cad4;
      cursor: pointer;
      margin-bottom: 2px;
      transition: all 0.15s;
      font-family: var(--font);
      line-height: 1.4;
    }
    .example-btn:hover {
      border-color: var(--border);
      background: var(--card);
      color: var(--text);
    }

    /* ── Chat area ───────────────────────────────────────── */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Empty state */
    .empty-state {
      margin: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      text-align: center;
      padding: 40px 20px;
    }
    .empty-icon {
      width: 64px;
      height: 64px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .empty-state h2 { font-size: 20px; color: var(--text); font-weight: 600; }
    .empty-state p  { font-size: 14px; max-width: 340px; line-height: 1.6; color: var(--muted); }

    /* ── Message bubbles ─────────────────────────────────── */
    .message { display: flex; gap: 12px; align-items: flex-start; max-width: 900px; }
    .message.user { flex-direction: row-reverse; margin-left: auto; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .avatar.user { background: var(--primary); }
    .avatar.bot  { background: var(--card); border: 1px solid var(--border); }

    .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-top-left-radius: 4px;
      padding: 12px 16px;
      max-width: 78%;
    }
    .message.user .bubble {
      background: var(--primary);
      border-color: var(--primary);
      border-radius: 14px;
      border-top-right-radius: 4px;
    }
    .bubble-text {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      word-break: break-word;
    }
    .message.user .bubble-text { color: #fff; }

    /* Accordions */
    .accordion {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .accordion-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(255,255,255,0.025);
      cursor: pointer;
      font-size: 12px;
      color: var(--muted);
      user-select: none;
      gap: 8px;
    }
    .accordion-toggle:hover { background: rgba(255,255,255,0.05); }
    .acc-left { display: flex; align-items: center; gap: 6px; }
    .chevron { transition: transform 0.2s; font-style: normal; }
    .accordion-toggle.open .chevron { transform: rotate(180deg); }
    .accordion-body { display: none; }
    .accordion-body.open { display: block; }

    /* SQL blocks */
    .sql-wrap { padding: 10px; background: var(--bg); }
    .sql-block {
      font-family: var(--mono);
      font-size: 11.5px;
      background: #0a0d14;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 12px;
      overflow-x: auto;
      white-space: pre;
      line-height: 1.55;
      color: #c9d1d9;
      margin-bottom: 6px;
    }
    .sql-block:last-child { margin-bottom: 0; }
    .sql-kw  { color: #ff7b72; font-weight: 500; }
    .sql-fn  { color: #d2a8ff; }
    .sql-str { color: #a5d6ff; }
    .sql-num { color: #79c0ff; }

    /* Data table */
    .table-wrap { overflow-x: auto; max-height: 220px; overflow-y: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; font-family: var(--mono); }
    thead tr { background: var(--card); position: sticky; top: 0; z-index: 1; }
    th {
      color: var(--muted);
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 8px 12px;
      text-align: left;
      white-space: nowrap;
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 7px 12px;
      border-top: 1px solid rgba(255,255,255,0.04);
      color: var(--text);
      white-space: nowrap;
    }
    tr:hover td { background: rgba(255,255,255,0.025); }

    /* Meta row */
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }
    .meta-item { display: flex; align-items: center; gap: 4px; }
    .badge-warn {
      font-size: 11px;
      color: var(--warning);
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 4px;
      padding: 1px 7px;
    }

    /* Thinking dots */
    .thinking { display: flex; gap: 5px; align-items: center; padding: 2px 0; }
    .thinking span {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.3s ease-in-out infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-7px); opacity: 1; }
    }

    /* ── Input bar ───────────────────────────────────────── */
    .input-area {
      padding: 12px 24px 18px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px 10px 16px;
      transition: border-color 0.15s;
    }
    .input-row:focus-within { border-color: var(--primary); }
    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      max-height: 120px;
      min-height: 22px;
    }
    textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, opacity 0.15s;
      flex-shrink: 0;
    }
    .send-btn:hover:not(:disabled) { background: var(--primary-hover); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn svg { width: 16px; height: 16px; }
    .input-hint {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      margin-top: 5px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: #3d4460; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    DB Agent
  </div>
  <div class="header-right">
    <div class="model-badge" id="modelBadge">llama-3.1-70b</div>
    <div class="status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting…</span>
    </div>
  </div>
</header>

<div class="layout">

  <aside>
    <div class="sidebar-section">
      <div class="sidebar-title">📋 Schema</div>
      <div class="schema-box" id="schemaBox">Loading…</div>
    </div>
    <div class="examples-wrap">
      <div class="examples-title">💡 Try these</div>
      <div id="examples"></div>
    </div>
  </aside>

  <div class="chat-container">
    <div class="messages" id="messages">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <h2>Ask your database anything</h2>
        <p>Type a plain-English question and the AI agent will write SQL, run it, and explain the results.</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <textarea id="input" placeholder="Ask a question about the data…" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" disabled title="Send (Enter)">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint">Enter to send · Shift+Enter for newline</div>
    </div>
  </div>

</div>

<script>
  /* ── Config ────────────────────────────────────────────── */
  // When served by FastAPI at http://localhost:8000/ the API is same-origin.
  // When opened as file:// point to the running API.
  const API = window.location.protocol === 'file:' ? 'http://localhost:8000' : '';

  const EXAMPLES = [
    'Which product category has the highest total revenue?',
    'Who are the top 5 customers by total spending?',
    'What is the average order value per country?',
    'Which products have an average rating below 3?',
    'How many orders were placed each month in 2024?',
    'What percentage of orders are completed vs cancelled?',
    'Which city has the most Premium segment customers?',
    'What are the top 3 best-selling products by quantity?',
    'What is the total revenue per category in 2024?',
    'Which customers have placed more than 5 orders?',
  ];

  /* ── Sidebar examples ──────────────────────────────────── */
  const examplesEl = document.getElementById('examples');
  EXAMPLES.forEach(q => {
    const btn = document.createElement('button');
    btn.className = 'example-btn';
    btn.textContent = q;
    btn.onclick = () => setInput(q);
    examplesEl.appendChild(btn);
  });

  /* ── Input helpers ─────────────────────────────────────── */
  const inputEl  = document.getElementById('input');
  const sendBtn  = document.getElementById('sendBtn');

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    sendBtn.disabled = inputEl.value.trim().length < 3;
  });

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function setInput(text) {
    inputEl.value = text;
    inputEl.dispatchEvent(new Event('input'));
    inputEl.focus();
  }

  /* ── Status / init ─────────────────────────────────────── */
  async function init() {
    try {
      const r = await fetch(`${API}/health`);
      if (r.ok) {
        const d = await r.json();
        setStatus('connected', 'Connected');
        document.getElementById('modelBadge').textContent = d.model || 'llama-3.1-70b';
        sendBtn.disabled = inputEl.value.trim().length < 3;
      } else {
        setStatus('error', 'API error');
      }
    } catch {
      setStatus('error', 'API unreachable');
    }

    try {
      const r = await fetch(`${API}/schema`);
      if (r.ok) {
        const d = await r.json();
        document.getElementById('schemaBox').textContent = d.schema;
      }
    } catch {
      document.getElementById('schemaBox').textContent = 'Schema unavailable';
    }
  }

  function setStatus(state, text) {
    document.getElementById('statusDot').className = `status-dot ${state}`;
    document.getElementById('statusText').textContent = text;
  }

  /* ── SQL highlighter (lightweight regex) ───────────────── */
  const SQL_KW = /\b(SELECT|FROM|WHERE|JOIN|LEFT|RIGHT|INNER|OUTER|FULL|CROSS|ON|GROUP\s+BY|ORDER\s+BY|HAVING|LIMIT|OFFSET|WITH|UNION|ALL|DISTINCT|AS|AND|OR|NOT|IN|IS|NULL|LIKE|BETWEEN|CASE|WHEN|THEN|ELSE|END|INSERT|UPDATE|DELETE|CREATE|DROP|ASC|DESC|OVER|PARTITION\s+BY)\b/gi;
  const SQL_FN = /\b(COUNT|SUM|AVG|MIN|MAX|ROUND|COALESCE|IFNULL|STRFTIME|LENGTH|UPPER|LOWER|SUBSTR|TRIM|DATE|DATETIME|JULIANDAY|ROW_NUMBER|RANK|DENSE_RANK|LEAD|LAG)\b/gi;

  function highlightSQL(raw) {
    const esc = raw
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    return esc
      .replace(SQL_FN, m => `<span class="sql-fn">${m}</span>`)
      .replace(SQL_KW, m => `<span class="sql-kw">${m}</span>`);
  }

  /* ── Table builder ─────────────────────────────────────── */
  function buildTable(rows) {
    if (!rows || !rows.length) return '<div style="padding:10px;font-size:12px;color:var(--muted)">No rows returned.</div>';
    const cols = Object.keys(rows[0]);
    let h = '<div class="table-wrap"><table><thead><tr>';
    cols.forEach(c => { h += `<th>${escHtml(String(c))}</th>`; });
    h += '</tr></thead><tbody>';
    rows.forEach(row => {
      h += '<tr>';
      cols.forEach(c => { h += `<td>${escHtml(row[c] == null ? '—' : String(row[c]))}</td>`; });
      h += '</tr>';
    });
    return h + '</tbody></table></div>';
  }

  /* ── Accordion ─────────────────────────────────────────── */
  let accId = 0;
  function accordion(label, inner) {
    const id = `acc${++accId}`;
    return `
      <div class="accordion">
        <div class="accordion-toggle" onclick="toggleAcc('${id}',this)" role="button">
          <span class="acc-left">${label}</span>
          <i class="chevron">▾</i>
        </div>
        <div class="accordion-body" id="${id}">${inner}</div>
      </div>`;
  }
  window.toggleAcc = (id, el) => {
    document.getElementById(id).classList.toggle('open');
    el.classList.toggle('open');
  };

  /* ── Send ──────────────────────────────────────────────── */
  let busy = false;

  async function sendMessage() {
    const q = inputEl.value.trim();
    if (!q || busy) return;
    busy = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    document.getElementById('emptyState')?.remove();
    const feed = document.getElementById('messages');

    // User bubble
    feed.insertAdjacentHTML('beforeend', `
      <div class="message user">
        <div class="avatar user">👤</div>
        <div class="bubble"><div class="bubble-text">${escHtml(q)}</div></div>
      </div>`);

    // Thinking bubble
    const tid = `t${Date.now()}`;
    feed.insertAdjacentHTML('beforeend', `
      <div class="message" id="${tid}">
        <div class="avatar bot">🤖</div>
        <div class="bubble">
          <div class="thinking"><span></span><span></span><span></span></div>
        </div>
      </div>`);
    scrollBottom();

    try {
      const r = await fetch(`${API}/query`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q }),
      });
      document.getElementById(tid)?.remove();

      if (!r.ok) {
        const err = await r.json().catch(() => ({ detail: r.statusText }));
        addError(feed, err.detail || 'Request failed.');
      } else {
        addAnswer(feed, await r.json());
      }
    } catch {
      document.getElementById(tid)?.remove();
      addError(feed, 'Could not reach the API — is it running on port 8000?');
    }

    busy = false;
    sendBtn.disabled = inputEl.value.trim().length < 3;
    scrollBottom();
  }

  function addAnswer(feed, d) {
    let extras = '';

    if (d.sql_queries?.length) {
      const blocks = d.sql_queries.map(s =>
        `<div class="sql-block">${highlightSQL(s)}</div>`).join('');
      extras += accordion(
        `🔍 SQL &nbsp;<small style="opacity:.6">${d.sql_queries.length} quer${d.sql_queries.length > 1 ? 'ies' : 'y'}</small>`,
        `<div class="sql-wrap">${blocks}</div>`
      );
    }

    if (d.data?.length) {
      extras += accordion(
        `📊 Data &nbsp;<small style="opacity:.6">${d.data.length} row${d.data.length !== 1 ? 's' : ''}</small>`,
        buildTable(d.data)
      );
    }

    const warn = d.success ? '' : `<span class="badge-warn">⚠ Did not converge</span>`;
    const meta = `
      <div class="meta">
        ${warn}
        <span class="meta-item">🔄 ${d.iterations} step${d.iterations !== 1 ? 's' : ''}</span>
        <span class="meta-item">⚡ ${d.latency_ms} ms</span>
      </div>`;

    feed.insertAdjacentHTML('beforeend', `
      <div class="message">
        <div class="avatar bot">🤖</div>
        <div class="bubble" style="max-width:82%">
          <div class="bubble-text">${escHtml(d.answer)}</div>
          ${extras}
          ${meta}
        </div>
      </div>`);
  }

  function addError(feed, msg) {
    feed.insertAdjacentHTML('beforeend', `
      <div class="message">
        <div class="avatar bot">🤖</div>
        <div class="bubble">
          <div class="bubble-text" style="color:var(--error)">⚠ ${escHtml(msg)}</div>
        </div>
      </div>`);
  }

  /* ── Utilities ─────────────────────────────────────────── */
  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>');
  }

  function scrollBottom() {
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  /* ── Boot ──────────────────────────────────────────────── */
  init();
</script>

</body>
</html>
